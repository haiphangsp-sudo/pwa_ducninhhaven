<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" href="/icons/favicon.ico">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2f4f3e">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Haven">
<title>Duc Ninh Haven</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/contextBar.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/motion.css">
<link rel="stylesheet" href="styles/hubMenu.css">
<link rel="stylesheet" href="styles/hubContent.css">
<link rel="stylesheet" href="styles/cartBar.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/responsive.css">
<link rel="stylesheet" href="styles/ui-system.css">
</head>
<body>

    <div id="app">
        <div id="contextBar" class="flex">
            <div class="row container">
                <div class="row nav-bar nav-left">
                     <span class="identity-icon"></span>
                    <span class="identity-label"></span>
                </div>
                <div class="nav-bar nav-center">
                    <button class="location-btn row btn">
                        <span class="loc-label"></span>
                        <span class="loc-arrow">▾</span>
                    </button>
                </div>
                <div class="nav-bar nav-right">
                    <div id="langSwitch" class="row lang-switch">
                        <button class="btn btn-ghost" data-lang="vi">VI</button>
                        <button class="btn btn-ghost"data-lang="en">EN</button>
                    </div>
                    <span class="app-version"></span>
                </div>
            </div>
        </div>
        <div id="hub" class="flex">
            <aside id="hubMenu" class="flex container"></aside>
            <section id="hubContent" class="container">
                <div class="page-container container">
                    <div class="category-panel flex"></div>
                </div>
            </section>
        </div>
        
        <div id="cartBar" class="row cart-bar hidden">
            <div class="cart-info">
                <span class="cart-icon">🛒</span>
                <span id="cartCount">0</span>
            </div>
            <button id="cartOpen" class="btn btn-primary cart-open"></button>
        </div>
        <div id="cartDrawer" class="cart-drawer hidden">
            <div class="drawer-backdrop"></div>
            <div class="drawer-panel">
                <div class="row drawer-header">
                    <span class="drawer-title"></span>
                    <span class="drawer-total"></span>
                    <button id="drawerClose">✕</button>
                </div>
                <div id="drawerItems" class="stack drawer-items"></div>
                <div class="drawer-footer">
                    <button id="drawerSend" class="drawer-send"></button>
                </div>
            </div>
        </div>
        <!-- ACK Overlay -->
        <div id="ackOverlay" class="overlay hidden"></div>
        <!-- Delivery Banner -->
        <div id="deliveryStatus" class="delivery-banner hidden"></div>
        <div id="recoveryBanner" class="recovery-banner hidden"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>

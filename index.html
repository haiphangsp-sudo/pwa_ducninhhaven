<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2f5d46">
<meta name="background-color" content="#f4f1ea">
<link rel="preconnect" href="/">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/favicon.ico">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duc Ninh Haven">
<title>Duc Ninh Haven</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body class="app">
    <div id="app" class="flex">
        <div id="contextBar" class="row context-bar">
            <div class="nav center">
                <div class="nav-left context-bar__identity">
                    <span class="identity-icon"></span>
                    <span class="identity-label"></span>
                </div>
                <div class="nav-center context-bar__place">
                    <button id="pickerNav" data-action="open-overlay" data-value="placePicker" class="location-btn row btn">
                        <span class="loc-label"></span>
                        <span class="loc-arrow">▾</span>
                    </button>
                </div>
                <div class="nav-right">
                    <div id="langSwitch" class="lang-switch context-bar__lang">
                        <button class="btn btn-ghost" data-action="change-lang" data-value="vi">VI</button>
                        <button class="btn btn-ghost" data-action="change-lang" data-value="en">EN</button>
                    </div>
                    <span class="app-version"></span>
                </div>
            </div>
        </div>
        <div id="hub" class="flex">
            <aside id="hubMenu" class="hub-menu flex"></aside>

            <section id="hubContent" class="main hub-content">
                <div class="page-container">    
                    <div class="category-panel stack"></div>
                </div>
            </section>
        </div>
       
        <div id="cartBar" class="row cart-bar center hidden">
            <div class="cart-info">
                <span class="cart-bar__icon">🛒</span>
                <div class="cart-bar__meta">
                    <span id="cartCount" class="cart-bar__count">0</span>
                </div>
            </div>
            <button id="cartOpen" data-action="open-overlay" data-value="cartDrawer" class="btn btn-primary cart-bar__button"></button>
        </div>
    </div>
        <!-- Overlay layer -->
    <div id="overlayBackdrop" class="overlay-backdrop hidden" data-action="close-overlay"></div>
    <div id="overlay" class="overlay">
        <div id="orderStatusBar" class="order-status-bar hidden">
            <div class="bar-content">
                <div class="bar-mini">
                    <span class="icon">🔔</span>
                     <span id="orderActiveCount" class="count">0</span>
                 </div>
                <div class="bar-expanded">
                    <span id="orderStatusText" class="status-text"></span>
                     <button id="btnCheckOrders" class="btn-check-order">Kiểm tra ❯</button>
                 </div>
            </div>
            <button id="btnToggleBar" class="btn-toggle-status">❯</button>
        </div>
        <div id="optionSheet" class="overlay__panel option-sheet hidden"></div>
        <div id="cartDrawer" class="overlay__panel overlay__panel--bottom overlay-drawer hidden">
            <div class="drawer-panel">
                <div class="drawer__header stack gap-m drawer-header">
                    <div class="items-center row">
                        <div class="row center">
                            <span class="drawer__header-title drawer-title"></span>
                            <span id="namePlace" class="info-place color-brand"></span>
                        </div>
                        <button id="drawerClose" data-action="close-overlay" class="drawer__close btn-close">✕</button>
                    </div>
                    <div class="drawer-summary bg-muted p-m radius-m row items-center justify-between">
                        <div class="row gap-xs">
                            <span class="drawer__header-price drawer-total text-xl"></span>
                            <div class="row items-center gap-s text-s text-muted">
                                <span class="drawer__header-unique stat-lines"></span>
                                <span class="dot-divider">•</span>
                                <span class="drawer__header-count stat-qty"></span>
                            </div>
                        </div>
                        <div class="summary-icon">🛒</div>
                    </div>
                </div>
                <div id="drawerItems" class="stack drawer__items"></div>
                <div class="drawer-footer">
                    <button id="drawerSend" class="drawer-send"></button>
                </div>
            </div>
        </div>
        <div id="placePicker" class="overlay__panel overlay__panel--center overlay-picker hidden"></div>
     </div>
    <!-- System feedback -->
    <div id="ackOverlay" class="overlay__ack hidden"></div>
    <div id="deliveryStatus" class="delivery-banner hidden"></div>
    <div id="recoveryBanner" class="recovery-banner hidden"></div>
    <script type="module" src="main.js?v=2.1.1"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2f5d46">
<meta name="background-color" content="#f4f1ea">
<link rel="preconnect" href="/">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/favicon.ico">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duc Ninh Haven">
<title>Duc Ninh Haven</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body class="app">
    <div id="app" class="flex">
        <div id="contextBar" class="row context-bar">
            <div class="nav center">
                <div class="nav-left">
                    <span class="identity-icon"></span>
                    <span class="identity-label"></span>
                </div>
                <div class="nav-center">
                    <button class="location-btn row btn">
                        <span class="loc-label"></span>
                        <span class="loc-arrow">▾</span>
                    </button>
                </div>
                <div class="nav-right">
                    <div id="langSwitch" class="lang-switch">
                        <button class="btn btn-ghost" data-lang="vi">VI</button>
                        <button class="btn btn-ghost"data-lang="en">EN</button>
                    </div>
                    <span class="app-version"></span>
                </div>
            </div>
        </div>
        <div id="hub" class="flex">
            <aside id="hubMenu" class="hub-menu flex"></aside>
            <section id="hubContent" class="hub-content">
                <div class="page-container">
                    <div class="category-panel stack"></div>
                </div>
            </section>
        </div>
        <div id="cartBar" class="row cart-bar hidden">
            <div class="cart-info">
                <span class="cart-icon">🛒</span>
                <span id="cartCount">0</span>
            </div>
            <button id="cartOpen" class="btn btn-primary cart-open"></button>
        </div>
    </div>
        <!-- Overlay layer -->
    <div id="overlayBackdrop" class="overlay-backdrop hidden"></div>
    <div id="cartDrawer" class="overlay-panel overlay-bottom overlay-drawer hidden">
        <div class="drawer-panel">
            <div class="row drawer-header">
                <span class="drawer-title"></span>
                <span class="drawer-total"></span>
                <button id="drawerClose">✕</button>
            </div>
            <div id="drawerItems" class="stack drawer-items"></div>
            <div class="drawer-footer">
                <button id="drawerSend" class="drawer-send"></button>
            </div>
        </div>
    </div>
    <div id="placePicker" class="overlay-panel overlay-center overlay-picker hidden"></div>
        <!-- System feedback -->
    <div id="ackOverlay" class="overlay hidden"></div>
    <div id="deliveryStatus" class="delivery-banner hidden"></div>
    <div id="recoveryBanner" class="recovery-banner hidden"></div>
    <script type="module" src="main.js"></script>
</body>
</html>

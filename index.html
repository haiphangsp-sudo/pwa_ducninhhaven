<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/icons/favicon.ico">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2f4f3e">

<meta name="apple-mobile-web-app-capable" content="yes">

    <div id="app">
        <div id="contextBar"></div>
        <div id="hub">
            <aside id="hubMenu"></aside>
            <section id="hubContent"></section>

        <div id="ackOverlay" class="overlay hidden"></div>

        <div id="deliveryStatus" class="delivery-banner hidden"></div>

            <button id="recoverySend">Gửi lại</button>
            <button id="recoveryCancel">Bỏ</button>

        <div id="cartBar" class="hidden"></div>
    </div>

    <script type="module" src="main.js"></script>

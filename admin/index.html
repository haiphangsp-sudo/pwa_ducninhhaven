<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2f4f3e">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Haven Admin">
  <title>Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header class="admin-header">
    <div class="admin-lock">
      <div id="adminLock" class="lock-box">
        <h2>Quản trị</h2>
        <button class="btn" id="loginBtn">Đăng nhập</button>
      </div>

      <div id="adminBtn" class="lock-box" style="display:none">
        <button class="btn" id="logoutBtn">Thoát quản trị</button>
      </div>
    </div>
  </header>

  <div id="adminApp" style="display:none">
    <div class="admin-tabs">
      <button class="btn tab-btn is-active" data-tab="menu">Món</button>
      <button class="btn tab-btn" data-tab="place">Vị trí</button>
    </div>

    <section id="tab-menu" class="tab-panel">
      <div class="admin-toolbar">
        <button class="btn" id="resetMenuBtn">Khôi phục Menu</button>
      </div>
      <div id="adminMenu"></div>
    </section>

    <section id="tab-place" class="tab-panel hidden">
      <div class="admin-toolbar">
        <button class="btn" id="resetPlacesBtn">Khôi phục Places</button>
      </div>
      <div id="adminPlaces"></div>
    </section>
  </div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
